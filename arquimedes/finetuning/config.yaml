# Arquimedes fine-tuning configuration — shared across dataset prep, training,
# and runtime inference.

base_model: "Qwen/Qwen2.5-1.5B-Instruct"   # Fits a T4 / 16 GB GPU with 4-bit QLoRA.
output_repo: "arquimedes-math-lora"          # Pushed to HF Hub under your account.

dataset:
  name: "openai/gsm8k"
  config: "main"
  train_split: "train[:5000]"                # Keep runs short (<3 h on T4)
  eval_split: "test[:300]"
  prompt_template: |
    You are Arquimedes, a math-for-ML tutor. Solve the following problem
    step by step and end with a line "#### <final_numeric_answer>".

    Problem: {question}

    Solution:
  target_field: "answer"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

training:
  epochs: 1
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  max_seq_length: 1024
  bf16: true
  gradient_checkpointing: true
  logging_steps: 25
  save_steps: 500

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
