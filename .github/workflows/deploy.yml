name: Deploy

on:
  # Auto-deploy after the CI workflow succeeds on main OR the interview branch.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches:
      - main
      - "claude/arquimedes-math-agent-Mj90C"
  # Manual deploy: Actions tab → Deploy → Run workflow
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "claude/arquimedes-math-agent-Mj90C"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Skip if this was triggered by a failed CI run
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Resolve branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            BRANCH="${{ steps.branch.outputs.ref }}"
            APP_DIR="/opt/agents-demo"
            LEGACY_DIR="/root/agents-demo"

            # Prefer /opt/agents-demo; fall back to the legacy /root location
            # if it exists so we don't create two copies side by side.
            if [ -d "$LEGACY_DIR/.git" ] && [ ! -d "$APP_DIR/.git" ]; then
                APP_DIR="$LEGACY_DIR"
            fi

            echo "[deploy] target dir: $APP_DIR / branch: $BRANCH"

            # Install docker on first run
            if ! command -v docker >/dev/null 2>&1; then
                apt-get update -y
                apt-get install -y ca-certificates curl gnupg git
                install -m 0755 -d /etc/apt/keyrings
                curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                  | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                chmod a+r /etc/apt/keyrings/docker.gpg
                . /etc/os-release
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $VERSION_CODENAME stable" \
                  > /etc/apt/sources.list.d/docker.list
                apt-get update -y
                apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
                systemctl enable --now docker
            fi

            # Clone or update
            if [ -d "$APP_DIR/.git" ]; then
                git -C "$APP_DIR" fetch origin
                git -C "$APP_DIR" checkout "$BRANCH"
                git -C "$APP_DIR" reset --hard "origin/$BRANCH"
            else
                git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
                git -C "$APP_DIR" checkout "$BRANCH"
            fi

            cd "$APP_DIR"

            # Seed .env from GitHub secrets if not already present
            if [ ! -f .env ]; then
                cat > .env <<ENV
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            HF_TOKEN=${{ secrets.HF_TOKEN }}
            LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
            LANGSMITH_TRACING=true
            LANGSMITH_PROJECT=agents-demo-arquimedes
            DEFAULT_MODEL=openai/gpt-4o-mini
            CHROMA_PATH=/app/data/chroma
            MEMORY_CHROMA_PATH=/app/data/memory_chroma
            HF_EMBED_MODEL=sentence-transformers/all-MiniLM-L6-v2
            HF_MAX_NEW_TOKENS=512
            RAG_K=4
            RAG_RERANK=false
            ENV
                chmod 600 .env
            fi

            # Rebuild + start the stack
            docker compose build
            docker compose up -d

            # Ingest the math RAG corpus (idempotent)
            sleep 4
            docker compose exec -T agents-api python -m arquimedes.rag.ingest --reset || true

            # nginx reverse proxy :80 → :8000 with SSE-safe settings
            if command -v nginx >/dev/null 2>&1; then
                cat > /etc/nginx/sites-available/arquimedes.conf <<'NGX'
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name _;

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_buffering off;
                    proxy_cache off;
                    proxy_read_timeout 3600s;
                    proxy_send_timeout 3600s;
                }
            }
            NGX
                ln -sf /etc/nginx/sites-available/arquimedes.conf /etc/nginx/sites-enabled/arquimedes.conf
                rm -f /etc/nginx/sites-enabled/default
                nginx -t && systemctl reload nginx
            fi

            echo "=== Deployed ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            sleep 5
            curl -sf http://localhost:8000/health && echo "✅ /health ok" || echo "⚠ /health failed"
