name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    env:
      LANGSMITH_TRACING: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Extras needed by the new tests (optional at runtime).
          pip install "mcp>=1.0.0" "psycopg2-binary>=2.9.9"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short --durations=10

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  smoke-mcp:
    name: MCP Server Smoke
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "mcp>=1.0.0"

      - name: Boot MCP server + list_tools roundtrip
        run: |
          python - <<'PY'
          import asyncio
          from mcp import ClientSession
          from mcp.client.stdio import stdio_client, StdioServerParameters

          async def main():
              params = StdioServerParameters(
                  command="python", args=["-m", "arquimedes.mcp_server"], cwd=".",
              )
              async with stdio_client(params) as (read, write):
                  async with ClientSession(read, write) as session:
                      await session.initialize()
                      tools = await session.list_tools()
                      names = {t.name for t in tools.tools}
                      expected = {
                          "assess_level", "generate_exercise", "explain_concept",
                          "find_resources", "search_knowledge_base",
                          "solve_symbolic", "plot_function",
                          "step_by_step_derive", "solve_with_finetuned",
                      }
                      missing = expected - names
                      assert not missing, f"missing MCP tools: {missing}"
                      print(f"OK — {len(names)} tools exposed via MCP")

          asyncio.run(main())
          PY
